# Portal Scanner Configuration — Shreya Patel | Senior Frontend Engineer
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)

# -- Recency settings --
# Jobs are sorted newest-first before being added to pipeline.md.
# Jobs older than max_age_days are skipped entirely.
recency:
  max_age_days: 14         # Skip jobs posted more than 14 days ago
  prefer_days: 3           # Flag jobs posted within 3 days as 🔥 Fresh
  sort: newest_first       # Always surface newest postings at the top of pipeline.md
  add_age_label: true      # Append [X days ago] to each pipeline entry

# -- Title filter --
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    - "Frontend"
    - "Front-end"
    - "Front End"
    - "React"
    - "UI Engineer"
    - "UI Developer"
    - "Web Engineer"
    - "JavaScript Engineer"
    - "TypeScript Engineer"
    - "Next.js"
    - "Full Stack"
    - "Fullstack"
    - "Web Developer"
    - "Software Engineer"
  negative:
    - "Junior"
    - "Intern"
    - ".NET"
    - "Java "
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
    - "Backend"
    - "Back-end"
    - "Data Engineer"
    - "Data Scientist"
    - "Machine Learning"
    - "DevOps"
    - "SRE"
    - "Infrastructure"
    - "Staff "
    - "Principal "
    - "Head of"
    - "Director"
    - "VP "
  seniority_boost:
    - "Senior"
    - "Lead"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.

search_queries:

  # -- Ashby --
  - name: Ashby — Senior Frontend
    query: 'site:jobs.ashbyhq.com "Senior Frontend Engineer" OR "Senior React Engineer" remote after:{date_14d}'
    enabled: true

  - name: Ashby — Frontend / React
    query: 'site:jobs.ashbyhq.com "Frontend Engineer" OR "React Engineer" OR "UI Engineer" remote after:{date_14d}'
    enabled: true

  - name: Ashby — Full Stack React
    query: 'site:jobs.ashbyhq.com "Full Stack Engineer" OR "Fullstack Engineer" React remote after:{date_14d}'
    enabled: true

  - name: Ashby — Next.js / TypeScript
    query: 'site:jobs.ashbyhq.com "Next.js" OR "TypeScript" "Frontend" OR "Engineer" remote after:{date_14d}'
    enabled: true

  # -- Greenhouse --
  - name: Greenhouse — Senior Frontend
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Senior Frontend Engineer" remote after:{date_14d}'
    enabled: true

  - name: Greenhouse — React / UI
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "React Engineer" OR "Frontend Engineer" OR "UI Engineer" remote after:{date_14d}'
    enabled: true

  - name: Greenhouse — Full Stack React
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Full Stack" React OR TypeScript remote senior after:{date_14d}'
    enabled: true

  # -- Lever --
  - name: Lever — Frontend / React
    query: 'site:jobs.lever.co "Frontend Engineer" OR "React Engineer" OR "Senior Frontend" remote after:{date_14d}'
    enabled: true

  - name: Lever — Full Stack / UI
    query: 'site:jobs.lever.co "Full Stack Engineer" OR "UI Engineer" OR "Web Engineer" React remote after:{date_14d}'
    enabled: true

  # -- Wellfound (startups) --
  - name: Wellfound — Senior Frontend
    query: 'site:wellfound.com "Senior Frontend Engineer" OR "React Engineer" OR "Frontend Lead" remote after:{date_14d}'
    enabled: true

  - name: Wellfound — Full Stack React
    query: 'site:wellfound.com "Full Stack" React OR TypeScript remote senior after:{date_14d}'
    enabled: true

  # -- Workable --
  - name: Workable — Frontend / React
    query: 'site:apply.workable.com "Frontend Engineer" OR "React Engineer" OR "UI Developer" remote senior after:{date_14d}'
    enabled: true

  # -- Remote-first job boards --
  - name: WeWorkRemotely — Frontend
    query: 'site:weworkremotely.com "Frontend Engineer" OR "React Engineer" OR "UI Engineer" OR "Full Stack"'
    enabled: true

  - name: RemoteOK — Frontend / React
    query: 'site:remoteok.com "Frontend Engineer" OR "React" OR "UI Engineer" OR "Full Stack"'
    enabled: true

  - name: Remotive — Frontend / React
    query: 'site:remotive.com "Frontend Engineer" OR "React" OR "UI Engineer" OR "TypeScript"'
    enabled: true

  - name: Working Nomads — Frontend
    query: 'site:workingnomads.com "Frontend Engineer" OR "React Engineer" OR "UI Developer"'
    enabled: true

  - name: Himalayas — Senior Frontend
    query: 'site:himalayas.app "Senior Frontend Engineer" OR "React Engineer" OR "Frontend Architect" remote'
    enabled: true

  # -- Aggregators & boards --
  - name: YC Jobs — Frontend / React
    query: 'site:workatastartup.com "Frontend Engineer" OR "React Engineer" OR "Full Stack" TypeScript remote'
    enabled: true

  - name: LinkedIn — Senior Frontend Remote US
    query: '"Senior Frontend Engineer" OR "Senior React Engineer" remote "United States" TypeScript site:linkedin.com/jobs after:{date_7d}'
    enabled: true

  - name: HN Who's Hiring — Frontend
    query: 'site:news.ycombinator.com "Frontend" OR "React" OR "TypeScript" "Senior" OR "Staff" remote'
    enabled: true

